<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Login - Rinching ATV</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div id="navbar" class="navbar"></div>
<div class="container narrow">
  <div class="card">
    <h2>Log In</h2>
    <div id="alertBox"></div>
    <form id="loginForm">
      <label>Email</label>
      <input type="email" name="email" required />
      <label>Password</label>
      <input type="password" name="password" required />
      <button class="btn" style="margin-top:18px;width:100%" type="submit">Log In</button>
    </form>
    <p class="muted" style="margin-top:16px">No account yet? <a href="/register.html">Register as a Customer</a></p>
    <div class="card" style="background:#f7f9fc;margin-top:20px">
      <strong>Demo staff accounts</strong>
      <p class="muted" style="margin:6px 0 0">
        Admin: admin@rinchingatv.com / Admin@123<br />
        Marshall: marshall@rinchingatv.com / Marshall@123
      </p>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
  (async () => { renderNav(await getCurrentUser()); })();

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const alertBox = document.getElementById("alertBox");
    const fd = new FormData(e.target);
    try {
      const user = await api("/auth/login", { method: "POST", body: { email: fd.get("email"), password: fd.get("password") } });
      window.location.href = roleHome(user.role);
    } catch (err) {
      showAlert(alertBox, err.message);
    }
  });
</script>
</body>
</html>
