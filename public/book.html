<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Book a Ride - Rinching ATV</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div id="navbar" class="navbar"></div>
<div class="container">
  <h2>Book an ATV Ride</h2>
  <div class="step-indicator">
    <div class="dot active" data-step="0"></div>
    <div class="dot" data-step="1"></div>
    <div class="dot" data-step="2"></div>
    <div class="dot" data-step="3"></div>
  </div>
  <div id="alertBox"></div>

  <!-- Step 0: Package -->
  <div class="step active" data-step="0">
    <div class="card">
      <h3>1. Choose a Package</h3>
      <div class="pkg-grid" id="pkgGrid"></div>
      <div class="flex-between" style="margin-top:20px">
        <span></span>
        <button class="btn" id="toStep1" disabled>Next: Date &amp; Time</button>
      </div>
    </div>
  </div>

  <!-- Step 1: Date & Time -->
  <div class="step" data-step="1">
    <div class="card">
      <h3>2. Select Date &amp; Time</h3>
      <p class="muted" id="pkgSummary"></p>
      <label>Ride Date</label>
      <input type="date" id="dateInput" />
      <p class="help" id="minDateHelp"></p>
      <label>Available Start Times</label>
      <select id="timeSelect"><option value="">Select a date first</option></select>
      <p class="help" id="availHelp"></p>
      <div class="flex-between" style="margin-top:20px">
        <button class="btn outline" id="backTo0">Back</button>
        <button class="btn" id="toStep2" disabled>Next: Rider Details</button>
      </div>
    </div>
  </div>

  <!-- Step 2: Pax -->
  <div class="step" data-step="2">
    <div class="card">
      <h3>3. Rider Details &amp; Pricing</h3>
      <div class="field-row">
        <div>
          <label>Adult Riders (solo, min. <span id="minAge">16</span> yrs old)</label>
          <input type="number" id="adultCount" min="1" value="1" />
        </div>
        <div>
          <label>Child Passengers (min. <span id="minChildAge">6</span> yrs, ride pillion with an adult)</label>
          <input type="number" id="childCount" min="0" value="0" />
        </div>
      </div>
      <p class="help" id="paxHelp"></p>

      <div class="card" style="background:#f7f9fc;margin-top:16px">
        <div class="flex-between"><span>Total price</span><strong id="totalPrice">RM0.00</strong></div>
        <div class="flex-between"><span>Deposit due now (<span id="depositPct">50</span>%)</span><strong id="depositAmt">RM0.00</strong></div>
        <div class="flex-between"><span>Balance due on-site</span><strong id="balanceAmt">RM0.00</strong></div>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="ackAge" />
        <label for="ackAge" style="margin:0">I confirm all riders meet the age/safety requirements above and will wear the safety gear provided.</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="ackRefund" />
        <label for="ackRefund" style="margin:0">I understand the deposit is non-refundable for cancellations made within 24 hours of the ride (see refund policy).</label>
      </div>

      <div class="flex-between" style="margin-top:20px">
        <button class="btn outline" id="backTo1">Back</button>
        <button class="btn" id="toStep3">Review &amp; Hold Slot</button>
      </div>
    </div>
  </div>

  <!-- Step 3: Payment -->
  <div class="step" data-step="3">
    <div class="card">
      <h3>4. Review, Hold &amp; Pay Deposit</h3>
      <div id="holdInfo"></div>
      <div id="paymentSection" style="display:none">
        <label>Payment Method</label>
        <select id="payMethod">
          <option value="toyyibpay">Online Banking / Card via toyyibPay (real sandbox gateway)</option>
          <option value="bank_transfer">Bank Transfer (manual, verified by Admin)</option>
          <option value="card">Simulated Card (offline demo, no internet required)</option>
        </select>
        <div id="refField" style="display:none">
          <label>Transfer Reference / Receipt No.</label>
          <input type="text" id="refInput" placeholder="e.g. TXN20260704001" />
        </div>
        <button class="btn success" id="payBtn" style="margin-top:16px;width:100%">Pay Deposit</button>
      </div>
      <div id="resultSection"></div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
let user, packages, chosenPackage, availData, chosenTime, booking, countdownTimer;

function goStep(n) {
  document.querySelectorAll(".step").forEach((s) => s.classList.toggle("active", s.dataset.step == n));
  document.querySelectorAll(".dot").forEach((d) => d.classList.toggle("active", d.dataset.step <= n));
  document.getElementById("alertBox").innerHTML = "";
}

function renderPackages() {
  const grid = document.getElementById("pkgGrid");
  grid.innerHTML = packages
    .map(
      (p) => `
    <div class="pkg-card" data-id="${p.id}">
      ${p.is_popular ? '<div class="badge-popular">Most Popular</div>' : ""}
      <div class="code">${p.code}</div>
      <div class="name">${p.name}</div>
      <div class="meta">${p.distance_km}km &middot; ${p.duration_label}</div>
      <div class="price">${money(p.base_price)} <span class="muted" style="font-weight:400;font-size:0.75rem">/ rider</span></div>
    </div>`
    )
    .join("");
  grid.querySelectorAll(".pkg-card").forEach((card) => {
    card.addEventListener("click", () => {
      grid.querySelectorAll(".pkg-card").forEach((c) => c.classList.remove("selected"));
      card.classList.add("selected");
      chosenPackage = packages.find((p) => p.id == card.dataset.id);
      document.getElementById("toStep1").disabled = false;
    });
  });
}

async function loadAvailability() {
  const date = document.getElementById("dateInput").value;
  const timeSelect = document.getElementById("timeSelect");
  const helpEl = document.getElementById("availHelp");
  timeSelect.innerHTML = "";
  document.getElementById("toStep2").disabled = true;
  if (!date || !chosenPackage) return;
  try {
    availData = await api(`/bookings/availability?date=${date}&package_id=${chosenPackage.id}`);
    if (availData.blockedDay) {
      timeSelect.innerHTML = `<option value="">No slots (${availData.blockedDay})</option>`;
      helpEl.textContent = "The park is closed on this date. Please pick another date.";
      return;
    }
    if (!availData.slots.length) {
      timeSelect.innerHTML = `<option value="">No slots available on this date</option>`;
      helpEl.textContent = "All ATV slots are booked for this date/package. Try another date.";
      return;
    }
    timeSelect.innerHTML =
      '<option value="">Select a start time</option>' +
      availData.slots.map((s) => `<option value="${s.time}">${s.time} (${s.remaining} ATV${s.remaining === 1 ? "" : "s"} left)</option>`).join("");
    helpEl.textContent = `Deposit required: ${availData.depositPercentage}% of total price. Each slot holds for 15 minutes once you proceed.`;
  } catch (err) {
    showAlert(document.getElementById("alertBox"), err.message);
  }
}

function updatePricing() {
  const adults = Math.max(1, parseInt(document.getElementById("adultCount").value || "1", 10));
  const children = Math.max(0, parseInt(document.getElementById("childCount").value || "0", 10));
  const pct = availData ? availData.childPassengerPricePct / 100 : 0.5;
  const depositPct = availData ? availData.depositPercentage : 50;
  const total = chosenPackage.base_price * adults + chosenPackage.base_price * pct * children;
  const deposit = Math.round(total * (depositPct / 100) * 100) / 100;
  const balance = Math.round((total - deposit) * 100) / 100;
  document.getElementById("totalPrice").textContent = money(total);
  document.getElementById("depositAmt").textContent = money(deposit);
  document.getElementById("balanceAmt").textContent = money(balance);
  document.getElementById("depositPct").textContent = depositPct;
  const maxChild = availData ? availData.maxChildPerAdult * adults : adults;
  document.getElementById("paxHelp").textContent = `Max ${maxChild} child passenger(s) allowed for ${adults} adult rider(s).`;
  if (availData) {
    document.getElementById("minAge").textContent = availData.minSoloRiderAge;
    document.getElementById("minChildAge").textContent = availData.minChildPassengerAge;
  }
}

async function createHold() {
  const holdInfo = document.getElementById("holdInfo");
  try {
    booking = await api("/bookings", {
      method: "POST",
      body: {
        package_id: chosenPackage.id,
        date: document.getElementById("dateInput").value,
        time_slot: chosenTime,
        adult_count: parseInt(document.getElementById("adultCount").value, 10),
        child_count: parseInt(document.getElementById("childCount").value, 10),
        ack_age_policy: document.getElementById("ackAge").checked,
        ack_refund_policy: document.getElementById("ackRefund").checked,
      },
    });
    renderHold();
    document.getElementById("paymentSection").style.display = "block";
  } catch (err) {
    showAlert(holdInfo, err.message);
  }
}

function renderHold() {
  const holdInfo = document.getElementById("holdInfo");
  holdInfo.innerHTML = `
    <div class="alert info">
      Slot held! Reference #RATV-${String(booking.id).padStart(5, "0")}.
      Complete payment within <span id="countdown">15:00</span> or the hold will expire.
    </div>
    <table>
      <tr><td>Package</td><td>${booking.package_code} - ${booking.package_name}</td></tr>
      <tr><td>Date / Time</td><td>${fmtDate(booking.booking_date)} at ${booking.time_slot}</td></tr>
      <tr><td>Riders</td><td>${booking.adult_count} adult(s), ${booking.child_count} child passenger(s)</td></tr>
      <tr><td>Total</td><td>${money(booking.total_price)}</td></tr>
      <tr><td>Deposit due now</td><td><strong>${money(booking.deposit_amount)}</strong></td></tr>
      <tr><td>Balance on-site</td><td>${money(booking.balance_due)}</td></tr>
    </table>`;
  const expires = new Date(booking.hold_expires_at.replace(" ", "T") + "Z").getTime();
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    const remaining = Math.max(0, expires - Date.now());
    const m = Math.floor(remaining / 60000);
    const s = Math.floor((remaining % 60000) / 1000);
    const el = document.getElementById("countdown");
    if (el) el.textContent = `${m}:${String(s).padStart(2, "0")}`;
    if (remaining <= 0) {
      clearInterval(countdownTimer);
      document.getElementById("paymentSection").style.display = "none";
      showAlert(document.getElementById("resultSection"), "Your hold expired. Please start the booking again.", "error");
    }
  }, 1000);
}

async function submitPayment() {
  const method = document.getElementById("payMethod").value;
  const reference = document.getElementById("refInput").value;
  const resultSection = document.getElementById("resultSection");
  try {
    const res = await api(`/bookings/${booking.id}/pay`, { method: "POST", body: { method, reference } });

    if (res.redirectUrl) {
      // Real toyyibPay sandbox flow: send the browser to the hosted payment page.
      resultSection.innerHTML = `<div class="alert info">Redirecting you to toyyibPay to complete your deposit payment&hellip;</div>`;
      window.location.href = res.redirectUrl;
      return;
    }

    clearInterval(countdownTimer);
    document.getElementById("paymentSection").style.display = "none";
    if (res.booking.status === "confirmed") {
      resultSection.innerHTML = `<div class="alert success"><strong>Booking confirmed!</strong> Admin will send your official confirmation shortly. You can track this booking under "My Bookings".</div>
        <a class="btn" href="/my-bookings.html">Go to My Bookings</a>`;
    } else {
      resultSection.innerHTML = `<div class="alert info"><strong>Payment submitted.</strong> Your booking is now pending Admin verification of the bank transfer. You'll see it update under "My Bookings".</div>
        <a class="btn" href="/my-bookings.html">Go to My Bookings</a>`;
    }
  } catch (err) {
    showAlert(resultSection, err.message);
  }
}

(async () => {
  user = await guardPage(["customer"]);
  if (!user) return;
  packages = await api("/packages");
  renderPackages();

  document.getElementById("toStep1").addEventListener("click", async () => {
    document.getElementById("pkgSummary").textContent = `${chosenPackage.code} - ${chosenPackage.name} (${chosenPackage.duration_label}) - ${money(chosenPackage.base_price)}/rider`;
    try {
      const window_ = await api("/bookings/booking-window");
      document.getElementById("dateInput").min = window_.minDate;
      document.getElementById("minDateHelp").textContent =
        `Bookings must be made at least ${window_.minAdvanceDays} day(s) in advance - earliest available date is ${window_.minDate}.`;
    } catch (err) {
      // Non-fatal: the backend still enforces this even if the hint fails to load.
    }
    goStep(1);
  });
  document.getElementById("backTo0").addEventListener("click", () => goStep(0));
  document.getElementById("dateInput").addEventListener("change", loadAvailability);
  document.getElementById("timeSelect").addEventListener("change", (e) => {
    chosenTime = e.target.value;
    document.getElementById("toStep2").disabled = !chosenTime;
  });
  document.getElementById("toStep2").addEventListener("click", () => {
    updatePricing();
    goStep(2);
  });
  document.getElementById("adultCount").addEventListener("input", updatePricing);
  document.getElementById("childCount").addEventListener("input", updatePricing);
  document.getElementById("backTo1").addEventListener("click", () => goStep(1));
  document.getElementById("toStep3").addEventListener("click", async () => {
    if (!document.getElementById("ackAge").checked || !document.getElementById("ackRefund").checked) {
      showAlert(document.getElementById("alertBox"), "Please acknowledge both policy checkboxes to continue.");
      return;
    }
    goStep(3);
    await createHold();
  });
  document.getElementById("payMethod").addEventListener("change", (e) => {
    document.getElementById("refField").style.display = e.target.value === "bank_transfer" ? "block" : "none";
  });
  document.getElementById("payBtn").addEventListener("click", submitPayment);
})();
</script>
</body>
</html>
