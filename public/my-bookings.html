<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>My Bookings - Rinching ATV</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div id="navbar" class="navbar"></div>
<div class="container">
  <div class="flex-between">
    <h2>My Bookings</h2>
    <a class="btn" href="/book.html">+ New Booking</a>
  </div>
  <div id="alertBox"></div>
  <div id="bookingsWrap"></div>
</div>
<script src="/js/api.js"></script>
<script>
  async function load() {
    const bookings = await api("/bookings/mine");
    const wrap = document.getElementById("bookingsWrap");
    if (!bookings.length) {
      wrap.innerHTML = `<div class="card">You have no bookings yet. <a href="/book.html">Book your first ATV ride</a>.</div>`;
      return;
    }
    wrap.innerHTML = bookings
      .map(
        (b) => `
      <div class="card">
        <div class="flex-between">
          <h3>#RATV-${String(b.id).padStart(5, "0")} &mdash; ${b.package_code}: ${b.package_name}</h3>
          <span class="badge ${b.status}">${statusLabel(b.status)}</span>
        </div>
        <table>
          <tr><td>Date / Time</td><td>${fmtDate(b.booking_date)} at ${b.time_slot} (${b.duration_label})</td></tr>
          <tr><td>Riders</td><td>${b.adult_count} adult(s), ${b.child_count} child passenger(s)</td></tr>
          <tr><td>Total price</td><td>${money(b.total_price)}</td></tr>
          <tr><td>Deposit</td><td>${money(b.deposit_amount)}</td></tr>
          <tr><td>Balance due on-site</td><td>${money(b.balance_due)}</td></tr>
        </table>
        ${
          b.status === "hold"
            ? `<a class="btn small" href="/book.html">Resume / re-book</a> <span class="help">This hold expires automatically after 15 minutes if unpaid.</span>`
            : ""
        }
      </div>`
      )
      .join("");
  }

  (async () => {
    const user = await guardPage(["customer"]);
    if (!user) return;
    try {
      await load();
    } catch (err) {
      showAlert(document.getElementById("alertBox"), err.message);
    }
  })();
</script>
</body>
</html>
